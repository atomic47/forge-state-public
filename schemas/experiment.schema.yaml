$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://atomic47.co/forge-state/schemas/experiment.schema.yaml"
title: ForgeExperiment
type: object
required: [id, slug, phase, created, updated, source, repo]
additionalProperties: false
properties:
  id:
    type: string
    pattern: "^EXP-[0-9]{4}$"
  slug:
    type: string
    pattern: "^[a-z0-9][a-z0-9-]{0,39}$"
  phase:
    type: string
    enum: [candidate, researched, cloned, built, build-failed, experimented, packaged, reported, published]
  created:
    type: string
    format: date-time
  updated:
    type: string
    format: date-time
  source:
    type: object
    required: [surface, channel, message_ts, marked_by, marked_with, url]
    additionalProperties: false
    properties:
      surface: { type: string, enum: [slack] }
      channel: { type: string }
      message_ts: { type: string }
      marked_by: { type: string }
      marked_with: { type: string }
      url: { type: string, format: uri }
  repo:
    type: object
    required: [url, host]
    additionalProperties: false
    properties:
      url: { type: string, format: uri }
      host: { type: string, enum: [github, gitlab, codeberg, other] }
      ref: { type: [string, "null"] }
      commit: { type: [string, "null"] }
      license: { type: [string, "null"] }
  research:
    type: [object, "null"]
    additionalProperties: false
    properties:
      what: { type: string }
      who: { type: string }
      why_notable: { type: string }
      comparables:
        type: array
        items: { type: string }
      source_refs:
        type: array
        items: { type: string, format: uri }
  build:
    type: [object, "null"]
    additionalProperties: false
    properties:
      image_base: { type: string }
      commands:
        type: array
        items: { type: string }
      exit_code: { type: [integer, "null"] }
      duration_s: { type: [number, "null"] }
      env_manifest_ref: { type: string }
      status: { type: string, enum: [built, build-failed] }
      failure:
        type: [object, "null"]
        properties:
          last_command: { type: string }
          exit_code: { type: integer }
          tail: { type: string }
          reason: { type: string }
  experiment:
    type: [object, "null"]
    additionalProperties: false
    properties:
      type: { type: string, enum: [cli, library, webapp, mcp, service, model] }
      template: { type: string }
      steps:
        type: array
        items: { type: string }
      observations: { type: string }
      result: { type: string, enum: [success, partial, failed] }
  package:
    type: [object, "null"]
    additionalProperties: false
    properties:
      dockerfile_ref: { type: string }
      compose_ref: { type: string }
      run: { type: string }
      image: { type: [string, "null"] }
  report:
    type: [object, "null"]
    additionalProperties: false
    properties:
      ref: { type: string }
  outputs:
    type: [object, "null"]
    additionalProperties: false
    properties:
      gist_url: { type: [string, "null"], format: uri }
      blog_post_id: { type: [string, "null"] }
      blog_status: { type: string, enum: [draft, published] }
  events_emitted:
    type: array
    items: { type: string, enum: [build, publish] }
